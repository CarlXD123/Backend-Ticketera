version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sistema-tickets-sql
    environment:
      SA_PASSWORD: "Password123!"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      ConnectionStrings__TicketsConnection: "Server=sistema-tickets-sql,1433;Database=SistemaTicketsDB;User Id=sa;Password=Password123!;TrustServerCertificate=True;"
    depends_on:
      - sqlserver